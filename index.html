<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogisParts — Rantau Logistics System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg0:#080C14;--bg1:#0D1220;--bg2:#131A2E;--bg3:#1A2340;--bg4:#212D50;--b1:#1E2B4A;--b2:#2A3A60;--b3:#354878;--t1:#EFF3FB;--t2:#9AADCC;--t3:#5E7499;--blue:#4B8DF8;--cyan:#22D3EE;--green:#34D399;--amber:#FBBF24;--red:#F87171;--purple:#A78BFA;--r:10px;--rs:6px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--t1);overflow-x:hidden;}
.mono{font-family:'IBM Plex Mono',monospace;}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:var(--bg0);}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
::selection{background:rgba(75,141,248,.3);}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg0);background-image:radial-gradient(ellipse at 30% 20%,rgba(75,141,248,.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(34,211,238,.06) 0%,transparent 50%);}
.login-box{background:var(--bg2);border:1px solid var(--b1);border-radius:16px;padding:40px;width:380px;max-width:90%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fi .4s ease;}
.login-box h1{font-size:20px;font-weight:800;text-align:center;margin-bottom:4px;}.login-box h1 span{background:linear-gradient(135deg,#4B8DF8,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-box .sub{text-align:center;font-size:11px;color:var(--t3);margin-bottom:28px;}
.login-field{margin-bottom:16px;}.login-field label{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.login-field input{width:100%;background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rs);padding:12px 14px;color:var(--t1);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;}.login-field input:focus{border-color:var(--blue);}
.login-btn{width:100%;padding:12px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,#4B8DF8,#3A75D8);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;}.login-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(75,141,248,.3);}
.login-err{color:var(--red);font-size:11px;text-align:center;margin-top:10px;}
.login-hint{margin-top:20px;padding:14px;background:var(--bg1);border-radius:var(--rs);border:1px solid var(--b1);}.login-hint p{font-size:9px;color:var(--t3);margin-bottom:4px;}.login-hint .acc{display:flex;justify-content:space-between;font-size:10px;padding:3px 0;color:var(--t2);}.login-hint .acc span:first-child{color:var(--cyan);font-weight:600;font-family:'IBM Plex Mono',monospace;}
.shell{display:flex;min-height:100vh;}.side{width:230px;background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;z-index:90;transition:transform .3s;}
.side-brand{padding:16px 14px;border-bottom:1px solid var(--b1);}.side-brand h1{font-size:14px;font-weight:800;background:linear-gradient(135deg,#4B8DF8,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.side-brand span{font-size:9px;color:var(--t3);display:block;margin-top:2px;text-transform:uppercase;letter-spacing:.08em;}
.side-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.snav{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rs);cursor:pointer;font-size:11px;font-weight:600;color:var(--t3);border:1px solid transparent;transition:all .15s;user-select:none;}.snav:hover{background:var(--bg2);color:var(--t2);}.snav.on{background:rgba(75,141,248,.1);color:var(--blue);border-color:rgba(75,141,248,.2);}.snav-ico{width:28px;height:28px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:13px;}.snav.on .snav-ico{background:rgba(75,141,248,.15);}.snav.locked{opacity:.35;cursor:not-allowed;}
.side-user{padding:10px;border-top:1px solid var(--b1);}.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rs);}.user-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.side-foot{padding:8px;border-top:1px solid var(--b1);}.logout-btn{width:100%;padding:8px;border:1px solid rgba(248,113,113,.2);border-radius:var(--rs);background:rgba(248,113,113,.06);color:var(--red);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;}.logout-btn:hover{background:rgba(248,113,113,.12);}
.content{margin-left:230px;flex:1;padding:20px;min-width:0;}.pg-hd{margin-bottom:16px;display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:10px;}.pg-hd h2{font-size:20px;font-weight:800;letter-spacing:-.02em;}.pg-hd p{font-size:11px;color:var(--t3);margin-top:3px;}
.cd{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:12px;}.cd-t{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:14px;}.st{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:12px;}.st-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;}.st-v{font-size:22px;font-weight:800;margin-top:4px;letter-spacing:-.02em;}.st-s{font-size:9px;color:var(--t3);margin-top:2px;}
.dtb{width:100%;border-collapse:collapse;font-size:11px;}.dtb th{text-align:left;padding:8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);border-bottom:1px solid var(--b1);background:rgba(0,0,0,.15);}.dtb td{padding:8px;border-bottom:1px solid rgba(30,43,74,.5);}.dtb tbody tr:hover{background:var(--bg3);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--rs);border:none;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}.btn-p{background:linear-gradient(135deg,#4B8DF8,#3A75D8);color:#fff;}.btn-p:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(75,141,248,.3);}.btn-g{background:var(--bg3);color:var(--t2);border:1px solid var(--b1);}.btn-g:hover{border-color:var(--b2);}.btn-d{background:rgba(248,113,113,.1);color:var(--red);}.btn-grn{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.2);}.btn-sm{padding:4px 8px;font-size:9px;}
.badge{display:inline-flex;padding:3px 7px;border-radius:10px;font-size:9px;font-weight:700;}
.fbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px;padding:10px;background:var(--bg1);border:1px solid var(--b1);border-radius:var(--r);}.fbar input,.fbar select{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rs);padding:6px 8px;color:var(--t1);font-family:inherit;font-size:11px;outline:none;max-width:160px;}.fbar select option{background:var(--bg1);}
.cpb{height:4px;border-radius:2px;background:rgba(255,255,255,.05);overflow:hidden;margin-top:3px;}.cpf{height:100%;border-radius:2px;transition:width .5s ease;}
.sg{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}.sd{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rs);padding:7px;min-height:90px;cursor:pointer;transition:all .15s;}.sd:hover{border-color:var(--b2);}.sd.today{border-color:var(--blue);box-shadow:0 0 10px rgba(75,141,248,.1);}.sd-n{font-size:10px;font-weight:700;color:var(--t3);margin-bottom:4px;}.sd-v{padding:2px 5px;border-radius:3px;font-size:8px;font-weight:700;display:block;margin-top:2px;text-align:center;}
.tog{width:36px;height:20px;border-radius:10px;background:var(--b1);cursor:pointer;position:relative;transition:background .3s;flex-shrink:0;display:inline-block;}.tog.on{background:var(--amber);}.tog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .3s;}.tog.on::after{transform:translateX(16px);}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}.ml{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--r);padding:20px;max-width:720px;width:95%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.5);}.ml h3{font-size:15px;font-weight:700;margin-bottom:14px;}
.audit{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--t3);padding:6px 10px;background:rgba(75,141,248,.05);border:1px solid rgba(75,141,248,.1);border-radius:var(--rs);margin-top:6px;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2);}.leg-d{width:9px;height:9px;border-radius:2px;display:inline-block;}
.field{display:flex;flex-direction:column;gap:4px;}.field label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;}.field input,.field select,.field textarea{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rs);padding:8px 10px;color:var(--t1);font-family:inherit;font-size:12px;outline:none;width:100%;}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);}.field select option{background:var(--bg1);}.field textarea{resize:vertical;min-height:60px;}
.no-access{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;color:var(--t3);}.no-access span{font-size:48px;margin-bottom:16px;}
.xg{overflow-x:auto;border:1px solid var(--b1);border-radius:var(--rs);background:var(--bg1);}.xg table{width:100%;border-collapse:collapse;font-size:11px;min-width:700px;}.xg th{background:var(--bg3);padding:7px 5px;font-size:8px;font-weight:700;text-transform:uppercase;color:var(--t3);border:1px solid var(--b1);text-align:center;}.xg td{padding:1px;border:1px solid var(--b1);vertical-align:middle;}.xg td.rn{background:var(--bg3);text-align:center;font-size:9px;font-weight:700;color:var(--t3);width:28px;}.xg input,.xg select{width:100%;background:transparent;border:none;color:var(--t1);font-family:inherit;font-size:11px;padding:6px 7px;outline:none;}.xg input:focus,.xg select:focus{background:rgba(75,141,248,.08);}.xg select option{background:var(--bg1);}
.export-wrap{position:relative;display:inline-block;}.export-dd{position:absolute;right:0;top:100%;margin-top:4px;background:var(--bg1);border:1px solid var(--b2);border-radius:var(--rs);padding:4px;z-index:40;box-shadow:0 8px 24px rgba(0,0,0,.5);min-width:120px;display:none;}.export-dd.show{display:block;}.export-dd div{padding:7px 10px;cursor:pointer;font-size:11px;font-weight:600;color:var(--t2);border-radius:4px;}.export-dd div:hover{background:var(--bg3);}
.mob-btn{position:fixed;top:8px;left:8px;z-index:100;display:none!important;}.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:7px 12px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rs);}
.loading{text-align:center;padding:40px;color:var(--t3);font-size:13px;}.loading::after{content:'';display:inline-block;width:18px;height:18px;border:3px solid var(--b2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}.fi{animation:fi .3s ease forwards;}
.hidden{display:none!important;}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}.grid-5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:12px;}
.success-msg{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:var(--r);padding:14px;margin-bottom:14px;text-align:center;font-size:13px;font-weight:700;color:var(--green);}
.warning-box{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);border-radius:var(--rs);padding:8px;margin-bottom:12px;font-size:11px;color:var(--red);}
@media(max-width:860px){.side{transform:translateX(-100%);}.side.open{transform:translateX(0);}.content{margin-left:0;padding:12px;}.sg{grid-template-columns:repeat(4,1fr);}.mob-btn{display:block!important;}}
@media(max-width:700px){.grid-2,.grid-3,.grid-5{grid-template-columns:1fr;}.stats{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<script>
const API='https://script.google.com/macros/s/AKfycbzTbo9iRVqbBvtb43rSIqClp-gU0VFZPEfiipgPSk0B1FBRhZJMjm7mcoFLla75M2eV-g/exec';
async function G(p){try{const r=await fetch(API+'?'+new URLSearchParams(p));return await r.json()}catch(e){return{error:e.message}}}
async function P(d){try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(d)});return await r.json()}catch(e){return{error:e.message}}}

const RM={ut_rantau:{label:'UT Rantau (Site)',icon:'🏗️',color:'#4B8DF8'},hub:{label:'Hub BPP/BJM',icon:'🏭',color:'#F59E0B'},vendor:{label:'Vendor',icon:'🚛',color:'#8B5CF6'}};
const AL=[{id:"pickup",name:"Pickup",volume:1500,weight:.9,dimMax:{p:280,l:160,t:140},color:"#6B7280",bR:800000,bB:1200000},{id:"cde",name:"CDE",volume:3000,weight:2,dimMax:{p:350,l:170,t:160},color:"#8B5CF6",bR:1500000,bB:2200000},{id:"cdd_box",name:"CDD Box",volume:6000,weight:4,dimMax:{p:430,l:190,t:180},color:"#4B8DF8",bR:2500000,bB:3800000},{id:"cdd_3way",name:"CDD 3 Way",volume:6000,weight:4,dimMax:{p:430,l:190,t:250},color:"#0EA5E9",bR:2800000,bB:4200000},{id:"fuso",name:"Fuso",volume:15000,weight:8,dimMax:{p:580,l:230,t:250},color:"#F59E0B",bR:5500000,bB:7500000},{id:"tronton",name:"Tronton",volume:28000,weight:15,dimMax:{p:900,l:240,t:260},color:"#EF4444",bR:12000000,bB:15000000}];
const URG=[{id:"critical",label:"Critical (VOR)",color:"#EF4444"},{id:"urgent",label:"Urgent",color:"#F59E0B"},{id:"normal",label:"Normal",color:"#4B8DF8"},{id:"low",label:"Low/Stock",color:"#34D399"}];
const HUBS=["Hub Balikpapan","Hub Banjarmasin"],SL=["Draft","Menunggu Pickup","Dalam Pengiriman","Diterima di Site","Selesai"],VL=["PT. Express Jaya Group","PT Translog Kalimantan","CV Borneo Express","PT Sinar Harapan"],MO=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
let U=null,CP='dashboard',cP=[],sM=2,sY=2026;
const rp=n=>'Rp'+Number(n).toLocaleString('id-ID'),rj=n=>`Rp${(n/1e6).toFixed(1)}jt`;
const AM={ut_rantau:["dashboard","invoice","advisor","schedule","database"],hub:["dashboard","invoice","submit_invoice","advisor","schedule","database"],vendor:["dashboard","invoice","submit_invoice"]};
const cA=(r,p)=>AM[r]?.includes(p)||false;
const sC=s=>({"Draft":"var(--t3)","Menunggu Pickup":"var(--purple)","Dalam Pengiriman":"var(--blue)","Diterima di Site":"var(--cyan)","Selesai":"var(--green)"}[s]||"var(--t3)");
const sB=s=>({"Draft":"rgba(94,116,153,.12)","Menunggu Pickup":"rgba(167,139,250,.12)","Dalam Pengiriman":"rgba(75,141,248,.12)","Diterima di Site":"rgba(34,211,238,.12)","Selesai":"rgba(52,211,153,.12)"}[s]||"rgba(94,116,153,.12)");
const aC=id=>(AL.find(a=>a.id===id||a.name===id)?.color||'var(--t3)');
const aN=id=>(AL.find(a=>a.id===id||a.name===id)?.name||id);
function xCSV(h,r,fn){const c=[h.join(","),...r.map(r2=>r2.map(c2=>`"${String(c2).replace(/"/g,'""')}"`).join(","))].join("\n");const b=new Blob(["\uFEFF"+c],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=fn+".csv";a.click()}
function xJSON(d,fn){const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=fn+".json";a.click()}
function analyze(items){if(!items.length)return null;let tV=0,tW=0,mP=0,mL=0,mT=0,hU="low";const uo={critical:0,urgent:1,normal:2,low:3};const proc=items.map(it=>{const v=(it.panjang*it.lebar*it.tinggi*it.qty)/1e6;const w=(it.berat*it.qty)/1000;tV+=v;tW+=w;mP=Math.max(mP,it.panjang);mL=Math.max(mL,it.lebar);mT=Math.max(mT,it.tinggi);if(uo[it.urgency]<uo[hU])hU=it.urgency;return{...it,vol:v,wt:w}});const allIn=AL.map(a=>{const vp=(tV/a.volume)*100,wp=(tW/a.weight)*100,df=mP<=a.dimMax.p&&mL<=a.dimMax.l&&mT<=a.dimMax.t;return{...a,vp,wp,df,fits:vp<=100&&wp<=100&&df}});const best=allIn.filter(a=>a.fits).sort((a,b)=>a.volume-b.volume)[0];
// Logika: jika muat di CDD Box atau CDD 3Way (atau lebih kecil) → REGULER, kecuali Critical VOR
const cddBox=AL.find(a=>a.id==='cdd_box');const cdd3w=AL.find(a=>a.id==='cdd_3way');
const fitsCDD=best&&(best.id==='pickup'||best.id==='cde'||best.id==='cdd_box'||best.id==='cdd_3way');
let mode;
if(hU==='critical')mode='borongan';
else if(fitsCDD)mode=hU==='urgent'?'reguler_priority':'reguler';
else mode='borongan';
return{tV,tW,maxDim:{p:mP,l:mL,t:mT},hU,allIn,best,mode,proc}}
document.addEventListener('click',e=>{if(!e.target.closest('.export-wrap'))document.querySelectorAll('.export-dd.show').forEach(d=>d.classList.remove('show'))});
const NAV=[{id:"dashboard",icon:"📊",label:"Dashboard",desc:"Ringkasan & analisa"},{id:"invoice",icon:"📋",label:"Tracking Invoice",desc:"Lihat & edit invoice"},{id:"submit_invoice",icon:"📝",label:"Submit Invoice",desc:"Buat invoice baru"},{id:"advisor",icon:"🔧",label:"Smart Advisor",desc:"Rekomendasi armada"},{id:"schedule",icon:"📅",label:"Penjadwalan",desc:"Reguler + Borongan"},{id:"database",icon:"🗄️",label:"Database Part",desc:"Data sparepart"}];

document.getElementById('btn-login').onclick=doLogin;

if(d<dim)mh+=`<div onclick="sFSet(${d},${d+1})" style="background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:16px;cursor:pointer;text-align:center" onmouseover="this.style.borderColor='var(--cyan)'" onmouseout="this.style.borderColor='var(--b2)'"><div style="font-size:20px">➡️</div><div style="font-size:11px;font-weight:700;color:var(--cyan);margin-top:6px">Sesudah</div><div style="font-size:10px;color:var(--t2)">Tgl ${d+1}</div></div>`;
mh+=`<div onclick="sFCust(${d})" style="background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:16px;cursor:pointer;text-align:center" onmouseover="this.style.borderColor='var(--green)'" onmouseout="this.style.borderColor='var(--b2)'"><div style="font-size:20px">📅</div><div style="font-size:11px;font-weight:700;color:var(--green);margin-top:6px">Custom</div><div style="font-size:10px;color:var(--t2)">Pilih tanggal</div></div></div><div style="text-align:right"><button class="btn btn-g" onclick="schDayClick(${d})">← Kembali</button></div>`;
showModal(mh)};

// Add Borongan modal
window.schAddBorModal=function(d){
showModal(`<h3>Tambah Borongan — Tgl ${d} ${MO[sM]}</h3><div class="grid-2" style="margin-bottom:12px"><div class="field"><label>Tanggal</label><input value="${d} ${MO[sM]} ${sY}" disabled style="font-weight:700"></div><div class="field"><label>Armada</label><select id="ba">${AL.map(a=>`<option value="${a.id}">${a.name} (${a.weight}T)</option>`).join('')}</select></div></div><div class="field" style="margin-bottom:12px"><label>Catatan</label><input id="bn" placeholder="e.g. Swing Bearing PC200"></div><div style="display:flex;gap:8px;justify-content:space-between"><button class="btn btn-g" onclick="schDayClick(${d})">← Kembali</button><button class="btn btn-p" onclick="sABsD(${d})">✓ Tambah Borongan</button></div>`)};

window.sABsD=async function(d){closeModal();c.innerHTML='<div class="loading">Menyimpan...</div>';await P({action:'addBorongan',tanggal:d,armadaId:document.getElementById('ba').value,catatan:document.getElementById('bn').value,username:U.username});rSch(c)};

window.sFSet=async function(d,cv){closeModal();c.innerHTML='<div class="loading">Menyimpan...</div>';await P({action:'setFusoOnCall',tanggal:d,dir:cv<d?'before':'after',coveredDay:cv,username:U.username});rSch(c)};
window.sFCust=function(d){const ds=Array.from({length:dim},(_,i)=>i+1).filter(x=>x!==d);showModal(`<h3>Fuso ${d} — Pilih Custom</h3><div class="field" style="margin-bottom:16px"><label>Cover jatah CDD tanggal</label><select id="fc">${ds.map(x=>`<option value="${x}">${x} ${MO[sM]}</option>`).join('')}</select></div><div style="display:flex;gap:8px;justify-content:space-between"><button class="btn btn-g" onclick="schAddFusoModal(${d})">← Kembali</button><button class="btn btn-p" onclick="sFSet(${d},+document.getElementById('fc').value)">✓ Konfirmasi</button></div>`)};
window.sUS=async function(id,st){await P({action:'updateScheduleStatus',id,status:st});rSch(c)};
window.sDF=async function(id){closeModal();c.innerHTML='<div class="loading">Menghapus...</div>';await P({action:'removeFusoOnCall',id});rSch(c)};
window.sDB=async function(id){closeModal();c.innerHTML='<div class="loading">Menghapus...</div>';await P({action:'removeBorongan',id});rSch(c)};
// Legacy compat
window.sAB=function(){showModal(`<h3>Tambah Borongan</h3><div class="grid-2" style="margin-bottom:12px"><div class="field"><label>Tanggal</label><select id="bd">${days.map(d=>`<option value="${d}">${d} ${MO[sM]}</option>`).join('')}</select></div><div class="field"><label>Armada</label><select id="ba">${AL.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select></div></div><div class="field" style="margin-bottom:12px"><label>Catatan</label><input id="bn" placeholder="e.g. Swing Bearing"></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-g" onclick="closeModal()">Batal</button><button class="btn btn-p" onclick="sABs()">Tambah</button></div>`)};
window.sABs=async function(){closeModal();c.innerHTML='<div class="loading">Menyimpan...</div>';await P({action:'addBorongan',tanggal:+document.getElementById('bd').value,armadaId:document.getElementById('ba').value,catatan:document.getElementById('bn').value,username:U.username});rSch(c)}}

// === DATABASE ===
async function rDB(c){c.innerHTML='<div class="loading">Memuat database...</div>';const r=await G({action:'getPartsDB'});let parts=r.parts||[];const ce=(U.role==='hub');let q="";function build(){const f=parts.filter(p=>!q||String(p.pn).toLowerCase().includes(q.toLowerCase())||String(p.nama).toLowerCase().includes(q.toLowerCase()));let h=`<div class="pg-hd fi"><div><h2>🗄️ Database Part</h2><p>${ce?'Kelola':'Lihat'} — Google Sheets</p></div><div class="export-wrap"><button class="btn btn-grn btn-sm" onclick="this.nextElementSibling.classList.toggle('show')">⬇</button><div class="export-dd"><div onclick="dX('CSV')">CSV</div><div onclick="dX('JSON')">JSON</div></div></div></div>`;if(ce){h+=`<div class="cd fi"><div class="cd-t">Tambah</div><div class="xg"><table><thead><tr><th>PN</th><th>Nama</th><th>Brand</th><th>Kat</th><th>P</th><th>L</th><th>T</th><th>Berat</th><th style="width:50px">+</th></tr></thead><tbody><tr><td><input id="dp" placeholder="PN"></td><td><input id="dn" placeholder="Nama"></td><td><input id="db" placeholder="Brand"></td><td><input id="dk" placeholder="Kat"></td><td><input id="d1" type="number" style="text-align:right;font-family:'IBM Plex Mono'"></td><td><input id="d2" type="number" style="text-align:right;font-family:'IBM Plex Mono'"></td><td><input id="d3" type="number" style="text-align:right;font-family:'IBM Plex Mono'"></td><td><input id="d4" type="number" style="text-align:right;font-family:'IBM Plex Mono'"></td><td style="text-align:center"><button class="btn btn-p btn-sm" onclick="dA()">＋</button></td></tr></tbody></table></div></div>`}h+=`<div class="cd fi"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div class="cd-t" style="margin-bottom:0">Database (${f.length})</div><input id="dq" placeholder="🔍 Cari..." value="${q}" style="background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rs);padding:5px 8px;color:var(--t1);font-size:11px;width:180px"></div><div style="overflow-x:auto"><table class="dtb"><thead><tr><th>PN</th><th>Nama</th><th>Brand</th><th>Kat</th><th>P</th><th>L</th><th>T</th><th>Berat</th>${ce?'<th>×</th>':''}</tr></thead><tbody>`;f.forEach(p=>{h+=`<tr><td><span class="mono" style="color:var(--cyan);font-weight:600;font-size:10px">${p.pn}</span></td><td style="font-weight:600;font-size:11px">${p.nama}</td><td style="color:var(--t3);font-size:10px">${p.brand}</td><td><span class="badge" style="background:rgba(167,139,250,.08);color:var(--purple);font-size:8px">${p.kategori}</span></td><td class="mono" style="font-size:10px">${p.panjang}</td><td class="mono" style="font-size:10px">${p.lebar}</td><td class="mono" style="font-size:10px">${p.tinggi}</td><td class="mono" style="font-size:10px">${p.berat}kg</td>${ce?`<td><button class="btn btn-d btn-sm" onclick="dD('${p.pn}')">✕</button></td>`:''}</tr>`});h+=`</tbody></table></div></div>`;c.innerHTML=h;const si=document.getElementById('dq');if(si)si.oninput=e=>{q=e.target.value;build()}}window.dA=async function(){const pn=document.getElementById('dp').value.trim(),nm=document.getElementById('dn').value.trim();if(!pn||!nm)return;c.innerHTML='<div class="loading">Menyimpan...</div>';await P({action:'addPart',pn,nama:nm,brand:document.getElementById('db').value.trim(),kategori:document.getElementById('dk').value.trim(),panjang:+document.getElementById('d1').value||0,lebar:+document.getElementById('d2').value||0,tinggi:+document.getElementById('d3').value||0,berat:+document.getElementById('d4').value||0});rDB(c)};window.dD=async function(pn){if(!confirm('Hapus '+pn+'?'))return;c.innerHTML='<div class="loading">Menghapus...</div>';await P({action:'deletePart',pn});rDB(c)};window.dX=function(fmt){const f=parts.filter(p=>!q||String(p.pn).toLowerCase().includes(q.toLowerCase())||String(p.nama).toLowerCase().includes(q.toLowerCase()));if(fmt==='CSV')xCSV(["PN","Nama","Brand","Kat","P","L","T","Berat"],f.map(p=>[p.pn,p.nama,p.brand,p.kategori,p.panjang,p.lebar,p.tinggi,p.berat]),"parts_db");else xJSON(f,"parts_db");document.querySelectorAll('.export-dd.show').forEach(d=>d.classList.remove('show'))};build()}
</script>
